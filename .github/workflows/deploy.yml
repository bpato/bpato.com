name: Deploy to Hosting

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: npm ci

      - run: npm audit --audit-level=high

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run check

      - name: Build size check
        run: |
          npm run build
          du -sh dist/
          BUILD_SIZE=$(du -s dist/ | cut -f1)
          echo "Build size: ${BUILD_SIZE}KB"

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  build-deploy:
    needs: security
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - run: npm ci

      - run: npm run build
        env:
          WP_DOMAIN: ${{ secrets.WP_DOMAIN }}
          DOMAIN: ${{ secrets.DOMAIN }}

      - uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ vars.FTP_SERVER_DIR }}

      - name: Health check
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=10
          SITE_URL=${{ vars.SITE_URL || secrets.DOMAIN }}

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i of $MAX_RETRIES..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL" --max-time 30)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Site is healthy (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "✗ Got HTTP $HTTP_CODE, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

          echo "✗ Health check failed after $MAX_RETRIES attempts"
          exit 1
