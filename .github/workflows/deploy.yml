name: Deploy to Hosting

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    uses: ./.github/workflows/ci.yml
    
  build-deploy:
    needs: security
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - run: npm ci

      - run: npm run build
        env:
          WP_DOMAIN: ${{ vars.WP_DOMAIN }}
          WP_API_CUSTOM: ${{ vars.WP_API_CUSTOM }}
          DOMAIN: ${{ vars.DOMAIN }}

      - uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}

      - name: Health check
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=10
          SITE_URL=${{ vars.DOMAIN }}

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i of $MAX_RETRIES..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL" --max-time 30)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Site is healthy (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "✗ Got HTTP $HTTP_CODE, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

          echo "✗ Health check failed after $MAX_RETRIES attempts"
          exit 1
