version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "automated"
    groups:
      production:
        dependency-type: "production"
      development:
        dependency-type: "development"
    reviewers:
      - "bpato"
    assignees:
      - "bpato"
